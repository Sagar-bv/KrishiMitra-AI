# .github/workflows/production-delivery.yml
name: KrishiMitra High-Throughput Continuous Integration & Deployment Pipeline

on:
  push:
    branches: [ master, 'release/v*' ]
  pull_request:
    branches: [ master ]

permissions:
  contents: read
  packages: write

jobs:
  static-security-audit:
    name: Code Security & Integrity Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code Repository
        uses: actions/checkout@v4

      - name: Initialize Isolated Python Runtime
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Static Analysis Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install safety bandit

      - name: Audit Backend Manifest Vulnerabilities
        run: |
          cd backend
          safety check -r requirements.txt || true

      - name: Execute Static Application Security Testing (SAST)
        run: |
          cd backend
          bandit -r app/ -ll -ii

  frontend-quality-gate:
    name: Frontend Compilation & Validation Gate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code Repository
        uses: actions/checkout@v4

      - name: Initialize Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Frontend Dependencies
        run: |
          cd frontend
          npm ci

      - name: Run Strict Linting Validation
        run: |
          cd frontend
          npm run lint

      - name: Run Production Optimization Build Compile
        run: |
          cd frontend
          npm run build
        env:
          NEXT_PUBLIC_API_URL: https://api.krishimitra.ai/v1
          NEXT_TELEMETRY_DISABLED: 1

  container-build-and-push:
    name: High-Performance Containerization Delivery
    needs: [static-security-audit, frontend-quality-gate]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    steps:
      - name: Checkout Source Code Repository
        uses: actions/checkout@v4

      - name: Set up QEMU Architecture Emulators
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx Builder Node
        uses: docker/setup-buildx-action@v3

      - name: Authenticate to Enterprise Google Cloud Registry
        uses: docker/login-action@v3
        with:
          registry: gcr.io
          username: _json_key
          password: ${{ secrets.GCP_SA_CREDENTIALS_JSON }}

      - name: Build and Push Backend Container Production Artifact
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile.prod
          push: true
          tags: |
            gcr.io/${{ secrets.GCP_PROJECT_ID }}/krishimitra-backend-core:latest
            gcr.io/${{ secrets.GCP_PROJECT_ID }}/krishimitra-backend-core:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  trigger-rolling-infrastructure-release:
    name: Orchestrated Production Cloud Deployment Trigger
    needs: container-build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch Secure Deployment Sync Signal to Webhook Target Node
        run: |
          curl -X POST \
            -H "Content-Type: application/json" \
            -H "X-Deploy-Token-Signature: ${{ secrets.RENDER_DEPLOY_HMAC_SIGNATURE }}" \
            -d '{"environment": "production", "commit_sha": "${{ github.sha }}", "timestamp": "'$(date -u +%Y-%m-%dT%H:%M:%SZ)'"}' \
            "${{ secrets.RENDER_BACKEND_DEPLOY_WEBHOOK_URL }}"