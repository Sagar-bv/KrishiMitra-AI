<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" width="100%" height="100%">
  <defs>
    <linearGradient id="glowGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10B981" stop-opacity="1" />
      <stop offset="50%" stop-color="#059669" stop-color-opacity="1" />
      <stop offset="100%" stop-color="#22D3EE" stop-opacity="1" />
    </linearGradient>
    <linearGradient id="cyberGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0F172A" stop-opacity="0.8" />
      <stop offset="100%" stop-color="#1E293B" stop-opacity="0.8" />
    </linearGradient>
    <filter id="neonGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <g transform="translate(10, 10)">
    <path d="M 60 20 L 110 50 L 110 110 L 60 140 L 10 110 L 10 50 Z" fill="url(#cyberGrad)" stroke="url(#glowGrad)" stroke-width="3" />
    <path d="M 60 35 L 95 55 L 95 95 L 60 115 L 25 95 L 25 55 Z" fill="none" stroke="#22D3EE" stroke-width="1.5" stroke-dasharray="4 2" />
    <path d="M 60 45 Q 40 75 60 115 Q 80 75 60 45 Z" fill="url(#glowGrad)" filter="url(#neonGlow)" />
    <line x1="60" y1="20" x2="60" y2="140" stroke="url(#glowGrad)" stroke-width="2" />
    <circle cx="60" cy="45" r="4" fill="#FFFFFF" filter="url(#neonGlow)"/>
    <circle cx="60" cy="80" r="5" fill="#22D3EE" />
    <circle cx="60" cy="115" r="4" fill="#FFFFFF" filter="url(#neonGlow)"/>
    <path d="M 40 80 Q 60 95 80 80" fill="none" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round"/>
  </g>
  <text x="150" y="115" font-family="'Segoe UI', Roboto, Helvetica, sans-serif" font-size="76" font-weight="900" fill="#FFFFFF" letter-spacing="2">KRISHI<tspan fill="url(#glowGrad)">MITRA</tspan></text>
  <text x="155" y="150" font-family="'Segoe UI', Roboto, Helvetica, sans-serif" font-size="16" font-weight="600" fill="#22D3EE" letter-spacing="8">AI ORCHESTRATION PLATFORM</text>
  <path d="M 720 145 L 780 145" stroke="#22D3EE" stroke-width="2" stroke-linecap="round" />
  <circle cx="780" cy="145" r="3" fill="#10B981" />
