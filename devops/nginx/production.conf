user nginx;
worker_processes auto;
worker_rlimit_nofile 65535;

error_log /var/log/nginx/error.log warn;
pid       /var/run/nginx.pid;

events {
    worker_connections 8192;
    use epoll;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;

    # Stream Performance Optimizations
    sendfile           on;
    tcp_nopush         on;
    tcp_nodelay        on;
    keepalive_timeout  65;
    types_hash_max_size 2048;
    server_tokens      off;

    # Max Payload Boundary Allocation (Fits 10MB Images for Leaf Pathology)
    client_max_body_size 12M;

    # Gzip Compression Topologies
    gzip on;
    gzip_disable "msie6";
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_buffers 16 8k;
    gzip_http_version 1.1;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # Upstream Hardware Clusters Matrix mapping
    upstream frontend_node {
        server localhost:3000;
        keepalive 32;
    }

    upstream backend_node {
        server localhost:8000;
        keepalive 32;
    }

    # HTTP Canonical Port Forwarding Definition
    server {
        listen 80 default_server;
        listen [::]:80 default_server;
        server_name krishimitra.ai www.krishimitra.ai;
        return 301 https://$host$request_uri;
    }

    # Production Secure SSL Reverse Proxy Configuration Matrix
    server {
        listen 443 ssl http2 default_server;
        listen [::]:443 ssl http2 default_server;
        server_name krishimitra.ai www.krishimitra.ai;

        # Cryptographic Verification Keys (Managed via local automated certbot volumes)
        ssl_certificate /etc/letsencrypt/live/krishimitra.ai/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/krishimitra.ai/privkey.pem;
        ssl_trusted_certificate /etc/letsencrypt/live/krishimitra.ai/chain.pem;

        # Hardened Transport Profiles
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers on;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 1d;
        ssl_session_tickets off;

        # Strict Security Headers Hardening Loop
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Content-Security-Policy "default-src 'self' http: https: data: blob: 'unsafe-inline' 'unsafe-eval';" always;
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

        # Next.js Static Asset Subspace Route Optimizations
        location /_next/static/ {
            proxy_pass http://frontend_node;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            expires 1y;
            access_log off;
            add_header Cache-Control "public, max-age=31536000, immutable";
        }

        # Next.js Application Proxy Routing Node
        location / {
            proxy_pass http://frontend_node;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
        }

        # FastAPI Core Endpoint Reverse Proxy Architecture
        location /api/v1/ {
            proxy_pass http://backend_node/api/v1/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 90;
            proxy_connect_timeout 90;
        }

        # Duplex Streaming WebSocket Chat Router Node Matrix
        location /ws/chat {
            proxy_pass http://backend_node/ws/chat;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "Upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 3600;
            proxy_send_timeout 3600;
        }
    }
}